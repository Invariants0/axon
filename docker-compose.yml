version: "3.9"

services:
  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    working_dir: /app/backend
    volumes:
      - ./:/app
    command: sh -c "uv sync && uv run uvicorn main:app --app-dir src --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
