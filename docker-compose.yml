services:
  postgres:
    image: postgres:16-alpine
    container_name: axon-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-axon}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: axon-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: axon-backend
    environment:
      ENV: ${ENV:-development}
      TEST_MODE: ${TEST_MODE:-true}
      AXON_MODE: ${AXON_MODE:-mock}
      AXON_API_KEY: ${AXON_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/axon}
      AXON_QUEUE_BACKEND: ${AXON_QUEUE_BACKEND:-redis}
      AXON_REDIS_URL: ${AXON_REDIS_URL:-redis://redis:6379}
      AXON_REDIS_QUEUE_NAME: ${AXON_REDIS_QUEUE_NAME:-axon:tasks}
      AXON_BREAKER_BACKEND: ${AXON_BREAKER_BACKEND:-redis}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost","http://localhost:80"]}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GRADIENT_API_KEY: ${GRADIENT_API_KEY:-}
      DIGITALOCEAN_API_TOKEN: ${DIGITALOCEAN_API_TOKEN:-}
      GRADIENT_MODEL_ACCESS_KEY: ${GRADIENT_MODEL_ACCESS_KEY:-}
      DIGITALOCEAN_KB_UUID: ${DIGITALOCEAN_KB_UUID:-}
      AXON_PLANNER_AGENT_URL: ${AXON_PLANNER_AGENT_URL:-}
      AXON_RESEARCH_AGENT_URL: ${AXON_RESEARCH_AGENT_URL:-}
      AXON_REASONING_AGENT_URL: ${AXON_REASONING_AGENT_URL:-}
      AXON_BUILDER_AGENT_URL: ${AXON_BUILDER_AGENT_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - axon_vector_db:/app/backend/.chroma
    command: ["python", "start.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: axon-nginx
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
  axon_vector_db:
