<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXON</title>
    <meta name="description" content="Self-evolving AI agent system" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <h1>AXON Dashboard</h1>
        <span id="status-badge" class="badge badge-idle">idle</span>
      </header>

      <main class="main">
        <!-- Task Input -->
        <section class="card" id="task-section">
          <h2 class="card-title">Task Input</h2>
          <div class="task-form">
            <textarea
              id="task-input"
              class="textarea"
              rows="3"
              placeholder="Describe the task for AXON…"
            ></textarea>
            <button id="submit-task" class="btn btn-primary">Submit Task</button>
          </div>
          <p id="task-feedback" class="feedback"></p>
        </section>

        <!-- Brain Logs -->
        <section class="card" id="brain-logs-section">
          <h2 class="card-title">Brain Logs</h2>
          <div id="brain-logs" class="log-container">
            <p class="placeholder">No logs yet.</p>
          </div>
        </section>

        <!-- Code Viewer -->
        <section class="card" id="code-viewer-section">
          <h2 class="card-title">Code Viewer</h2>
          <pre id="code-viewer" class="code-block"><code class="placeholder">No code to display.</code></pre>
        </section>

        <!-- Evolution Timeline -->
        <section class="card" id="evolution-section">
          <h2 class="card-title">Evolution Timeline</h2>
          <div id="evolution-timeline" class="timeline">
            <p class="placeholder">No evolution events yet.</p>
          </div>
        </section>

        <!-- Capability Graph -->
        <section class="card" id="capability-section">
          <h2 class="card-title">Capability Graph</h2>
          <div id="capability-graph" class="graph-container">
            <p class="placeholder">No capabilities registered.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
